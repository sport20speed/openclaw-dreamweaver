<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌙 DreamWeaver 控制台</title>
<style>
:root{--bg:#0b0b1a;--panel:#12122a;--border:rgba(255,255,255,0.06);--purple:#8b5cf6;--purple-bg:rgba(139,92,246,0.12);--purple-glow:rgba(139,92,246,0.25);--green:#10b981;--green-bg:rgba(16,185,129,0.12);--gold:#fbbf24;--red:#ef4444;--blue:#3b82f6;--text:#e8e8f0;--muted:#7878a0;--radius:12px;--shadow:0 2px 16px rgba(0,0,0,0.3)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter','Segoe UI','Noto Sans SC','PingFang SC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:3px}

/* Navbar */
.navbar{position:sticky;top:0;z-index:50;display:flex;align-items:center;justify-content:space-between;padding:0 32px;height:60px;background:rgba(11,11,26,0.85);backdrop-filter:blur(12px);border-bottom:1px solid var(--border)}
.navbar .brand{display:flex;align-items:center;gap:12px;font-weight:700;font-size:17px}
.navbar .moon{width:28px;height:28px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#c4b5fd,var(--purple));box-shadow:0 0 16px var(--purple-glow);transition:all .6s}
body.dreaming .navbar .moon{box-shadow:0 0 32px var(--purple-glow),0 0 60px rgba(139,92,246,0.15)}
.navbar .badge{display:inline-flex;align-items:center;gap:6px;padding:4px 14px;border-radius:20px;font-size:12px;font-weight:500;transition:all .3s}
.navbar .badge.idle{background:var(--border);color:var(--muted)}
.navbar .badge.running{background:var(--purple-bg);color:var(--purple)}.navbar .badge.running .dot{animation:pulse 1.2s infinite}
.navbar .badge.completed{background:var(--green-bg);color:var(--green)}
.dot{width:8px;height:8px;border-radius:50%;background:currentColor}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.navbar button{padding:8px 16px;border-radius:8px;border:none;font-size:13px;font-weight:500;font-family:inherit;cursor:pointer;transition:all .15s}
.btn-primary{background:var(--purple);color:#fff}.btn-primary:hover{background:#7c3aed}
.btn-stop{background:rgba(239,68,68,0.15);color:var(--red)}.btn-stop:hover{background:rgba(239,68,68,0.25)}

/* Layout */
.page{display:flex;height:calc(100vh - 60px)}
.sidebar{width:340px;flex-shrink:0;border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.main{flex:1;overflow-y:auto;padding:32px 40px}

/* Sidebar sections */
.sec{padding:16px 20px;border-bottom:1px solid var(--border)}
.section-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:10px;display:flex;justify-content:space-between}

.status-block{display:flex;align-items:center;gap:16px}
.status-block .ring{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;flex-shrink:0;border:2px solid var(--muted);color:var(--muted)}
.status-block .ring.running{border-color:var(--purple);color:var(--purple);animation:ringPulse 2s infinite}
@keyframes ringPulse{0%,100%{box-shadow:0 0 0 0 var(--purple-glow)}50%{box-shadow:0 0 0 8px transparent}}
.status-block .ring.completed{border-color:var(--green);color:var(--green)}
.progress{height:3px;border-radius:2px;background:rgba(255,255,255,0.06);overflow:hidden;margin-top:10px}
.progress .fill{height:100%;border-radius:2px;background:var(--purple);transition:width .5s}

.trigger-box{display:flex;gap:6px}
.trigger-box input{flex:1;padding:10px 14px;border-radius:8px;font-size:13px;font-family:inherit;border:1px solid var(--border);background:rgba(255,255,255,0.04);color:var(--text);outline:none}
.trigger-box input:focus{border-color:var(--purple);box-shadow:0 0 0 3px var(--purple-glow)}

.model-selector{display:flex;gap:6px;flex-wrap:wrap}
.model-selector button{padding:6px 14px;border-radius:20px;border:1px solid var(--border);font-size:12px;background:transparent;color:var(--muted);cursor:pointer;transition:.15s;font-family:inherit}
.model-selector button.active{background:var(--purple-bg);border-color:var(--purple);color:var(--purple)}

.dream-list{flex:1;overflow-y:auto;padding:8px 12px}
.dream-card{padding:12px 14px;border-radius:10px;cursor:pointer;transition:all .15s;border:1px solid transparent;margin-bottom:6px}
.dream-card:hover{background:rgba(255,255,255,0.03);border-color:rgba(255,255,255,0.06)}
.dream-card.selected{background:var(--purple-bg);border-color:rgba(139,92,246,0.25)}
.dream-card .top{display:flex;align-items:flex-start;gap:10px}
.dream-card .score-badge{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.dream-card .content{flex:1;min-width:0}
.dream-card .motif{font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dream-card .meta{font-size:11px;color:var(--muted);margin-top:3px}
.dream-card .tags{display:flex;gap:4px;margin-top:6px;flex-wrap:wrap}
.dream-card .tags span{padding:2px 8px;border-radius:10px;font-size:10px;background:rgba(255,255,255,0.04);color:var(--muted)}
.filter-bar{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px}
.filter-bar button{padding:4px 12px;border-radius:20px;border:none;font-size:11px;font-weight:500;background:rgba(255,255,255,0.04);color:var(--muted);cursor:pointer;font-family:inherit}
.filter-bar button.active{background:var(--purple-bg);color:var(--purple)}
.search-box{width:100%;padding:8px 12px;border-radius:8px;border:1px solid var(--border);font-size:12px;font-family:inherit;background:rgba(255,255,255,0.03);color:var(--text);outline:none;margin-top:8px}

/* Main views - toggled by display */
.view{display:none;animation:fadeIn .2s}.view.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* Welcome */
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;height:calc(100vh - 140px)}
.welcome .icon{font-size:72px;margin-bottom:16px;opacity:.6}
.welcome h2{font-size:24px;font-weight:600;margin-bottom:8px}
.welcome p{color:var(--muted);max-width:440px;line-height:1.7;font-size:14px}
.welcome .stats{display:flex;gap:16px;margin-top:32px}
.welcome .stat{padding:16px 24px;border-radius:10px;background:var(--panel);border:1px solid var(--border);text-align:center;min-width:90px}
.welcome .stat .num{font-size:28px;font-weight:800;background:linear-gradient(135deg,#c4b5fd,var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.welcome .stat .lbl{font-size:11px;color:var(--muted);margin-top:4px}

/* Detail */
.detail-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px;gap:16px}
.detail-header h2{font-size:22px;font-weight:600;line-height:1.4}
.detail-meta{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:24px}
.detail-meta .tag{padding:4px 14px;border-radius:20px;font-size:12px;font-weight:500;background:rgba(255,255,255,0.04);color:var(--muted);border:1px solid var(--border)}
.detail-meta .tag.purple{background:var(--purple-bg);color:var(--purple);border-color:rgba(139,92,246,0.2)}
.detail-meta .tag.green{background:var(--green-bg);color:var(--green);border-color:rgba(16,185,129,0.2)}
.score-card{display:flex;align-items:center;gap:20px;padding:24px;border-radius:var(--radius);background:var(--panel);border:1px solid var(--border);box-shadow:var(--shadow);margin-bottom:28px}
.score-ring{width:80px;height:80px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:800;flex-shrink:0}
.chart-card{background:var(--panel);border-radius:var(--radius);padding:24px;border:1px solid var(--border);margin-bottom:28px}
.chart-card canvas{width:100%;height:200px}
.solution-card{background:var(--panel);border-radius:var(--radius);padding:24px;border:1px solid var(--border);margin-bottom:28px}
.solution-body{font-family:'JetBrains Mono','Consolas',monospace;font-size:13px;line-height:1.8;color:var(--text);max-height:480px;overflow:auto;white-space:pre-wrap}
.action-bar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:40px}
.action-bar button{padding:10px 20px;border-radius:8px;font-size:13px;font-weight:500;font-family:inherit;cursor:pointer;border:none;transition:.15s}
.btn-apply{background:var(--green);color:#fff}
.btn-obsidian{background:rgba(139,92,246,0.15);color:#c4b5fd;border:1px solid rgba(139,92,246,0.3)}
.btn-challenge{background:transparent;border:1px solid var(--purple);color:var(--purple)}
.btn-export{background:transparent;border:1px solid var(--border);color:var(--muted)}
.btn-delete{background:transparent;border:1px solid rgba(239,68,68,0.3);color:var(--red)}

/* Settings */
.settings-card{background:var(--panel);border-radius:var(--radius);border:1px solid var(--border);padding:4px 20px;margin-bottom:16px}
.setting-row{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--border)}
.setting-row:last-child{border-bottom:none}
.setting-row label{font-size:13px;font-weight:500}
.setting-row .hint{font-size:11px;color:var(--muted);font-weight:400;margin-top:2px}
.setting-row input[type=text],.setting-row input[type=number]{width:120px;padding:6px 12px;border-radius:6px;border:1px solid var(--border);background:rgba(255,255,255,0.04);color:var(--text);font-size:12px;outline:none;text-align:right}
.setting-row input[type=checkbox]{accent-color:var(--purple);transform:scale(1.15)}
.setting-row select{width:120px;padding:6px 10px;border-radius:6px;border:1px solid var(--border);background:rgba(255,255,255,0.04);color:var(--text);font-size:12px;outline:none}

.toast{position:fixed;bottom:24px;right:24px;z-index:200;padding:12px 24px;border-radius:10px;font-size:14px;font-weight:500;background:var(--green);color:#fff;animation:toastUp .3s;box-shadow:0 4px 20px rgba(0,0,0,.4)}
@keyframes toastUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<nav class="navbar">
  <div class="brand"><div class="moon"></div>DreamWeaver</div>
  <div style="display:flex;align-items:center;gap:12px">
    <span id="navBadge" class="badge idle"><span class="dot"></span>等待中</span>
    <button class="btn-stop" id="navStop" style="display:none" onclick="stopDream()">■ 中断</button>
    <button onclick="showView('main')" style="background:transparent;border:none;color:var(--muted);font-size:18px;cursor:pointer">🏠</button>
    <button onclick="showView('settings')" style="background:transparent;border:none;color:var(--muted);font-size:18px;cursor:pointer">⚙️</button>
    <button class="btn-primary" onclick="document.getElementById('mi').focus()">+ 新梦境</button>
  </div>
</nav>

<div class="page">
  <aside class="sidebar">
    <div class="sec">
      <div class="section-title">状态</div>
      <div class="status-block">
        <div class="ring" id="sRing">—</div>
        <div>
          <div id="sLabel" style="font-size:13px;font-weight:600">空闲中</div>
          <div id="sDetail" style="font-size:12px;color:var(--muted);margin-top:2px">等待触发梦境</div>
          <div class="progress" id="pbar" style="display:none"><div class="fill" id="pfill" style="width:0%"></div></div>
        </div>
      </div>
    </div>
    <div class="sec">
      <div class="section-title">快速触发</div>
      <div class="trigger-box"><input id="mi" placeholder="输入母题（回车触发）..." onkeydown="if(event.key==='Enter')startDream()"></div>
    </div>
    <div class="sec">
      <div class="section-title">模型</div>
      <div class="model-selector">
        <button id="mCloud" class="active" onclick="setModel('cloud')">☁️ DeepSeek</button>
        <button id="mLocal" onclick="setModel('local')">🖥️ qwen3.5</button>
      </div>
    </div>
    <div class="sec" style="flex:1;overflow:hidden;display:flex;flex-direction:column">
      <div class="section-title"><span>梦境历史</span><span id="dCount">0</span></div>
      <div class="filter-bar">
        <button class="active" onclick="setFilter('all',this)">全部</button>
        <button onclick="setFilter('completed',this)">完成</button>
        <button onclick="setFilter('running',this)">运行中</button>
        <button onclick="setFilter('applied',this)">已应用</button>
        <input class="search-box" id="si" placeholder="搜索..." oninput="loadHistory()">
      </div>
      <div class="dream-list" id="dList"></div>
    </div>
  </aside>

  <main class="main">
    <div id="viewMain" class="view active"></div>
    <div id="viewDetail" class="view"></div>
    <div id="viewSettings" class="view" style="padding:0 40px 40px;max-width:640px"></div>
  </main>
</div>

<script>
const API='http://127.0.0.1:8000/dream';
let selId=null,filter='all',_timer=null;

function qs(s){return document.querySelector(s)}
function qsa(s){return document.querySelectorAll(s)}
function toast(m,c){const t=document.createElement('div');t.className='toast';t.textContent=m;c&&(t.style.background=c);document.body.appendChild(t);setTimeout(()=>t.remove(),3000)}
async function api(u,o){const r=await fetch(API+u,o);if(!r.ok)throw new Error(r.status+' '+r.statusText);return r.json()}

// ── View switching ──
function showView(v){
  ['viewMain','viewDetail','viewSettings'].forEach(id=>document.getElementById(id).classList.toggle('active',id==='view'+v.charAt(0).toUpperCase()+v.slice(1)));
  if(v==='main'){showWelcome();loadHistory()}
  if(v==='settings')renderSettings()
}

// ── Status ──
async function pollStatus(){
  try{
    const s=await api('/status');
    const ring=qs('#sRing'),label=qs('#sLabel'),detail=qs('#sDetail'),badge=qs('#navBadge'),pbar=qs('#pbar'),pf=qs('#pfill');
    const isRunning=s.status==='running';
    qs('#navStop').style.display=isRunning?'':'none';
    document.body.className=isRunning?'dreaming':s.status==='completed'?'completed':'';
    ring.className='ring '+s.status;ring.textContent=isRunning?s.current_round:'—';
    label.textContent=isRunning?'梦境进行中':s.status==='completed'?'已完成':'空闲中';
    detail.textContent=isRunning?s.motif||'运行中...':'等待触发';
    badge.className='badge '+s.status;badge.innerHTML=`<span class="dot"></span>${isRunning?'梦境中 '+s.current_round+'/'+s.max_rounds:s.status==='completed'?'已完成':'等待中'}`;
    if(isRunning){pbar.style.display='block';pf.style.width=s.max_rounds?Math.min(100,s.current_round/s.max_rounds*100)+'%':'0%'}else{pbar.style.display='none'}
  }catch(e){console.error('status:',e)}
}

// ── History ──
async function loadHistory(){
  try{
    const data=await api('/history?limit=200');
    let items=data.items||[];
    if(filter!=='all')items=items.filter(d=>d.status===filter);
    const sq=(qs('#si').value||'').toLowerCase();if(sq)items=items.filter(d=>(d.motif||'').toLowerCase().includes(sq));
    qs('#dCount').textContent=items.length;
    if(!items.length){qs('#dList').innerHTML='<div style="padding:24px;text-align:center;color:var(--muted);font-size:13px">暂无梦境记录</div>';return}
    qs('#dList').innerHTML=items.map(d=>{
      const s=d.best_score||0,c=s>=8?'var(--green)':s>=6?'var(--gold)':'var(--red)';
      return `<div class="dream-card${selId===d.id?' selected':''}" onclick="selectDream('${d.id}')">
        <div class="top"><div class="score-badge" style="background:${c}22;color:${c}">${s.toFixed(1)}</div>
        <div class="content"><div class="motif">${(d.motif||'未命名').slice(0,60)}</div>
        <div class="meta">${d.iterations||0}轮 · ${d.status||''} · ${(d.created_at||'').slice(0,10)}</div></div></div></div>`
    }).join('')
  }catch(e){console.error('history:',e)}
}
function setFilter(f,btn){filter=f;qsa('.filter-bar button').forEach(b=>b.classList.remove('active'));btn.classList.add('active');loadHistory()}

// ── Model ──
async function setModel(m){
  if(m==='local'){
    await api('/config',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({cloud_enabled:false,local_model:'qwen3.5:9b'})});
    qs('#mCloud').classList.remove('active');qs('#mLocal').classList.add('active');
    toast('🖥️ qwen3.5:9b')
  }else{
    await api('/config',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({cloud_enabled:true})});
    qs('#mLocal').classList.remove('active');qs('#mCloud').classList.add('active');
    toast('☁️ DeepSeek V4')
  }
}

// ── Welcome ──
function showWelcome(){
  const cards=document.querySelectorAll('.dream-card').length;
  qs('#viewMain').innerHTML=`<div class="welcome"><div class="icon">🌙</div><h2>DreamWeaver 梦境引擎</h2><p>输入母题后按回车，AI 自动进行五角色自我对弈：Genius → Critic → Judge → Refiner → Mutator</p><div class="stats"><div class="stat"><div class="num">${cards||'?'}</div><div class="lbl">梦境</div></div><div class="stat"><div class="num">🔄</div><div class="lbl">独立思考</div></div><div class="stat"><div class="num">🧠</div><div class="lbl">自主进化</div></div></div></div>`
}

// ── Detail ──
async function selectDream(id){
  selId=id;loadHistory();showView('detail');
  try{
    const d=await api('/'+id);const dream=d.dream,iter=d.iterations||[];
    renderDetail(dream,iter)
  }catch(e){qs('#viewDetail').innerHTML='<p>加载失败</p>'}
  window.scrollTo(0,0)
}
function renderDetail(dream,iter){
  const s=dream.best_score||0,c=s>=8?'var(--green)':s>=6?'var(--gold)':'var(--red)';
  const scored=iter.filter(l=>l.score!=null).sort((a,b)=>(a.round||0)-(b.round||0));
  const m=document.getElementById('viewDetail');
  m.innerHTML=`<div class="detail-header"><h2>${dream.motif||'未知'}</h2></div>
    <div class="detail-meta"><span class="tag purple">🆔 ${dream.id}</span><span class="tag">🔄 ${dream.iterations||0}轮</span><span class="tag">${dream.status||''}</span><span class="tag">${dream.convergence_reason||''}</span></div>
    <div class="score-card"><div class="score-ring" style="color:${c};border:3px solid ${c}">${s.toFixed(1)}</div>
      <div>迭代 ${dream.iterations||0}轮 · ${dream.convergence_reason||'—'}<br>${(dream.created_at||dream.start_time||'').slice(0,19)}</div></div>
    ${scored.length>1?`<div class="chart-card"><canvas id="scC"></canvas></div>`:''}
    <div class="solution-card"><div class="solution-body">${md(dream.final_solution||'无方案')}</div></div>
    <div class="action-bar">
      ${dream.status!=='applied'?`<button class="btn-apply" onclick="applyDream('${dream.id}')">✓ 标记已应用</button>`:''}
      <button class="btn-obsidian" onclick="openObsidian()">📓 Obsidian</button>
      <button class="btn-challenge" onclick="openChallenge('${dream.id}')">⚡ 挑战</button>
      <button class="btn-export" onclick="exportDream('${dream.id}')">📥 导出</button>
      <button class="btn-delete" onclick="deleteDream('${dream.id}')">🗑 删除</button>
    </div>`;
  if(scored.length>1)setTimeout(()=>drawChart(scored),100)
}
function md(t){return(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/^### (.+)$/gm,'<h3>$1</h3>').replace(/^## (.+)$/gm,'<h2>$1</h2>').replace(/^# (.+)$/gm,'<h1>$1</h1>').replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/`([^`]+)`/g,'<code>$1</code>')}
function drawChart(data){
  const c=document.getElementById('scC');if(!c)return;const ctx=c.getContext('2d');const W=c.parentElement.clientWidth-48,H=200;
  c.width=W*2;c.height=H*2;c.style.width=W+'px';c.style.height=H+'px';ctx.scale(2,2);
  const pad={t:24,r:20,b:32,l:44},pw=W-pad.l-pad.r,ph=H-pad.t-pad.b;
  const xs=data.map(d=>d.round||0),ys=data.map(d=>d.score||0),xM=Math.min(...xs),xX=Math.max(...xs)||1;
  const sx=v=>pad.l+(v-xM)/(xX-xM)*pw,sy=v=>pad.t+(1-v/10)*ph;
  ctx.strokeStyle='rgba(255,255,255,0.06)';ctx.lineWidth=1;
  for(let y=0;y<=10;y+=2){const py=sy(y);ctx.beginPath();ctx.moveTo(pad.l,py);ctx.lineTo(W-pad.r,py);ctx.stroke();ctx.fillStyle='var(--muted)';ctx.font='11px Inter';ctx.textAlign='right';ctx.fillText(y,pad.l-8,py+4)}
  ctx.strokeStyle='#8b5cf6';ctx.lineWidth=2.5;ctx.beginPath();ctx.shadowColor='rgba(139,92,246,0.4)';ctx.shadowBlur=8;
  data.forEach((d,i)=>{const px=sx(d.round),py=sy(d.score);i===0?ctx.moveTo(px,py):ctx.lineTo(px,py)});ctx.stroke();ctx.shadowBlur=0;
  data.forEach(d=>{const px=sx(d.round),py=sy(d.score);ctx.beginPath();ctx.arc(px,py,4,0,Math.PI*2);ctx.fillStyle=d.score>=8?'#10b981':d.score>=6?'#f59e0b':'#ef4444';ctx.fill();ctx.strokeStyle='#fff';ctx.lineWidth=1.5;ctx.stroke()});
  ctx.fillStyle='rgba(255,255,255,0.3)';ctx.textAlign='center';for(let i=0;i<data.length;i+=Math.max(1,Math.floor(data.length/8)))ctx.fillText(data[i].round,sx(data[i].round),H-8)
}

// ── Actions ──
async function startDream(){const m=qs('#mi').value;try{await api('/start',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({motif:m||null})});qs('#mi').value='';pollStatus();loadHistory();toast('🌙 梦境已启动')}catch(e){toast('启动失败','#ef4444')}}
async function stopDream(){try{await api('/stop',{method:'POST'});pollStatus();loadHistory();toast('梦境已中断')}catch(e){}}
async function applyDream(id){await api('/'+id+'/apply',{method:'POST'});toast('✓ 已标记为已应用');selectDream(id)}
async function deleteDream(id){if(!confirm('删除此梦境？'))return;await api('/'+id,{method:'DELETE'});selId=null;showView('main')}
async function exportDream(id){const d=await api('/'+id);const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(d,null,2)],{type:'application/json'}));a.download='dream-'+id+'.json';a.click();toast('📥 已导出')}
function openObsidian(){toast('在 Obsidian 同步设置中配置路径')}
function openChallenge(id){const o=document.createElement('div');o.style='position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);z-index:100;display:flex;align-items:center;justify-content:center';
  o.innerHTML=`<div style="background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:28px;width:460px;max-width:90vw"><h3 style="margin-bottom:8px">⚡ 挑战此方案</h3><p style="font-size:13px;color:var(--muted);margin-bottom:16px">提出质疑，AI 将针对性完善</p><textarea id="chT" style="width:100%;height:100px;padding:12px;border-radius:8px;font-size:13px;border:1px solid var(--border);background:rgba(255,255,255,0.04);color:var(--text);outline:none;resize:vertical"placeholder="方案忽略了实现成本..."></textarea>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:14px"><button onclick="this.closest(\\`[style]\\`).remove()" style="padding:8px 18px;border-radius:8px;border:none;background:rgba(255,255,255,0.06);color:var(--muted);cursor:pointer;font-size:13px">取消</button><button onclick="runChallenge()" style="padding:8px 18px;border-radius:8px;border:none;background:var(--purple);color:#fff;cursor:pointer;font-size:13px">发起挑战</button></div></div>`;
  document.body.appendChild(o);o.addEventListener('click',e=>e.target===o&&o.remove())
}
async function runChallenge(){const t=document.getElementById('chT')?.value;if(!t?.trim())return;document.querySelector('[style*="fixed"]').remove();qs('#mi').value='挑战: '+t.slice(0,80);startDream();toast('⚡ 挑战梦境已启动')}

// ── Settings ──
function renderSettings(){const v=document.getElementById('viewSettings');
  const fields=[
    {g:'模型与 API',items:[
      {k:'cloud_enabled',l:'启用云端 API',h:'允许调用 DeepSeek API',t:'check'},
      {k:'local_model',l:'本地模型 (Ollama)',h:'如 qwen3.5:9b',t:'txt'},
      {k:'daily_token_limit',l:'每日 Token 上限',h:'防止费用失控',t:'num'},
    ]},
    {g:'梦境参数',items:[
      {k:'enabled',l:'启用梦境',h:'关闭后不影响主 Agent',t:'check'},
      {k:'idle_timeout_seconds',l:'空闲超时（分钟）',h:'连续无操作自动触发',t:'num',dv:15,m:120},
      {k:'max_iterations',l:'最大迭代轮数',t:'num',dv:100,m:500},
      {k:'convergence_rounds',l:'收敛判定轮数',h:'连续N轮无提升即收敛',t:'num',dv:20,m:100},
      {k:'mutation_interval',l:'变异器间隔',h:'每N轮注入跨域变异',t:'num',dv:10,m:50},
      {k:'max_dream_duration_minutes',l:'最大时长（分钟）',h:'超时自动终止',t:'num',dv:60,m:480},
    ]},
    {g:'集成',items:[
      {k:'obsidian_vault_path',l:'Obsidian Vault 路径',h:'设置后自动同步',t:'txt'},
      {k:'dream_folder',l:'梦境笔记目录',t:'txt',dv:'Dreams'},
      {k:'notification',l:'启用通知',t:'check'},
    ]},
    {g:'资源管控',items:[
      {k:'resource_cpu_threshold',l:'CPU 阈值 (%)',h:'超阈值延迟启动',t:'num',dv:80},
      {k:'resource_memory_threshold',l:'内存阈值 (%)',t:'num',dv:85},
    ]},
  ];
  v.innerHTML=fields.map(g=>`<div class="settings-card"><div style="padding:14px 0 4px;font-size:13px;font-weight:600;color:var(--muted)">${g.g}</div>${g.items.map(f=>{
    const id='s_'+f.k;
    if(f.t==='check')return `<div class="setting-row"><label>${f.l}${f.h?`<div class="hint">${f.h}</div>`:''}</label><input type="checkbox" id="${id}"></div>`;
    if(f.t==='txt')return `<div class="setting-row"><label>${f.l}${f.h?`<div class="hint">${f.h}</div>`:''}</label><input type="text" id="${id}"></div>`;
    return `<div class="setting-row"><label>${f.l}${f.h?`<div class="hint">${f.h}</div>`:''}</label><input type="number" id="${id}" ${f.m?`max="${f.m}"`:''}></div>`
  }).join('')}</div>`).join('')+
  `<button onclick="saveSettings()" style="width:100%;padding:12px;border-radius:8px;border:none;background:var(--purple);color:#fff;font-size:14px;font-family:inherit;font-weight:600;cursor:pointer">💾 保存设置</button>`

  // Load current config into form
  loadSettings();
}
async function loadSettings(){
  try{
    const c=await api('/config');
    for(const[k,v]of Object.entries(c)){const e=document.getElementById('s_'+k);if(e){if(e.type==='checkbox')e.checked=!!v;else e.value=v}}
    // Update model selector
    if(c.cloud_enabled){qs('#mLocal').classList.remove('active');qs('#mCloud').classList.add('active')}
    else{qs('#mCloud').classList.remove('active');qs('#mLocal').classList.add('active')}
  }catch(e){console.error('load config:',e)}
}
async function saveSettings(){
  const v=document.getElementById('viewSettings');
  const fields=['cloud_enabled','local_model','daily_token_limit','enabled','idle_timeout_seconds','max_iterations','convergence_rounds','mutation_interval','max_dream_duration_minutes','obsidian_vault_path','dream_folder','notification','resource_cpu_threshold','resource_memory_threshold'];
  const body={};
  for(const k of fields){const e=document.getElementById('s_'+k);if(e)body[k]=e.type==='checkbox'?e.checked:isNaN(Number(e.value))?e.value:Number(e.value)}
  try{
    await api('/config',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    // Update model selector
    if(body.cloud_enabled){qs('#mLocal').classList.remove('active');qs('#mCloud').classList.add('active')}
    else{qs('#mCloud').classList.remove('active');qs('#mLocal').classList.add('active')}
    toast('💾 设置已保存')
  }catch(e){toast('保存失败','#ef4444')}
}

// ── Init ──
showWelcome();pollStatus();loadHistory();
_timer=setInterval(pollStatus,3000);
