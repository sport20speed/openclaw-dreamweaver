<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DreamWeaver · 午夜天文台</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:opsz,wght@9..40,400;9..40,500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #080c14; --panel: #0f1520; --panel-hover: #151c2a;
  --border: rgba(200,180,150,0.08); --border-active: rgba(200,180,150,0.18);
  --moon: #e2a654; --moon-dim: rgba(226,166,84,0.15); --moon-glow: rgba(226,166,84,0.08);
  --text: #e8e0d5; --text-dim: #8a8078; --text-muted: #5a5550;
  --rose: #c48450; --olive: #8b9e6e; --ember: #c46040;
  --serif: 'Cormorant Garamond', Georgia, 'Noto Serif SC', serif;
  --sans: 'DM Sans', 'PingFang SC', 'Noto Sans SC', sans-serif;
  --mono: 'JetBrains Mono', 'Consolas', monospace;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0 }

body {
  font-family: var(--sans); background: var(--ink); color: var(--text);
  min-height: 100vh; -webkit-font-smoothing: antialiased;
  background-image:
    radial-gradient(ellipse at 50% 0%, rgba(226,166,84,0.03) 0%, transparent 70%),
    radial-gradient(ellipse at 80% 100%, rgba(196,132,80,0.02) 0%, transparent 50%);
  background-attachment: fixed;
}
body::after {
  content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 999;
  opacity: 0.03; background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 256px 256px;
}

::-webkit-scrollbar { width: 4px } ::-webkit-scrollbar-track { background: transparent }
::-webkit-scrollbar-thumb { background: rgba(200,180,150,0.1); border-radius: 2px }

/* ── Masthead ── */
.masthead {
  position: sticky; top: 0; z-index: 50;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 40px; height: 56px;
  background: rgba(8,12,20,0.88); backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
}
.masthead .logo {
  display: flex; align-items: center; gap: 14px;
  font-family: var(--serif); font-size: 20px; font-weight: 400;
  letter-spacing: 0.02em; color: var(--text);
}
.masthead .logo em { font-style: italic; color: var(--text-dim); margin-right: 2px }

/* Moon breathing */
.moon-phase {
  width: 32px; height: 32px; border-radius: 50%; position: relative;
  background: radial-gradient(circle at 35% 35%, #f0d090, var(--moon));
  box-shadow: 0 0 24px var(--moon-glow), 0 0 60px rgba(226,166,84,0.03);
  transition: box-shadow 1.2s ease;
}
.moon-phase.waxing {
  animation: breathe 3s ease-in-out infinite;
}
@keyframes breathe {
  0%, 100% { box-shadow: 0 0 16px var(--moon-glow), 0 0 40px rgba(226,166,84,0.02); }
  50% { box-shadow: 0 0 32px rgba(226,166,84,0.25), 0 0 80px rgba(226,166,84,0.06); }
}

.masthead .nav-group { display: flex; align-items: center; gap: 4px }
.masthead button {
  font-family: var(--sans); font-size: 13px; font-weight: 400;
  padding: 7px 16px; border-radius: 6px; cursor: pointer; transition: all 0.2s;
  border: 1px solid transparent; background: transparent; color: var(--text-dim);
}
.masthead button:hover { color: var(--text); background: var(--panel-hover) }
.masthead button.primary {
  background: rgba(226,166,84,0.1); color: var(--moon); border-color: rgba(226,166,84,0.2);
}
.masthead button.primary:hover { background: rgba(226,166,84,0.18) }
.masthead button.stop {
  color: var(--ember); border-color: rgba(196,96,64,0.25); background: rgba(196,96,64,0.06);
}
.masthead .sep { width: 1px; height: 20px; background: var(--border); margin: 0 8px }

/* Status indicator */
.status-chip {
  display: inline-flex; align-items: center; gap: 8px; font-size: 12px; font-weight: 500;
  padding: 4px 14px; border-radius: 20px; letter-spacing: 0.02em;
}
.status-chip.idle { color: var(--text-dim); background: rgba(255,255,255,0.03) }
.status-chip.running { color: var(--moon); background: var(--moon-dim) }
.status-chip.running .pulse-dot { animation: pulse 1.5s ease-in-out infinite }
.status-chip.completed { color: var(--olive); background: rgba(139,158,110,0.1) }
.pulse-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; display: inline-block }
@keyframes pulse { 0%,100% { opacity: 1; transform: scale(1) } 50% { opacity: 0.4; transform: scale(1.3) } }

/* ── Layout ── */
.page { display: flex; min-height: calc(100vh - 56px) }
.col-side { width: 370px; flex-shrink: 0; border-right: 1px solid var(--border); display: flex; flex-direction: column }
.col-main { flex: 1; min-width: 0; overflow-y: auto; position: relative }

/* Sidebar panes */
.pane { padding: 24px 24px 20px; border-bottom: 1px solid var(--border) }
.pane:last-child { border-bottom: none }
.pane-label {
  font-family: var(--sans); font-size: 10px; font-weight: 500; letter-spacing: 0.12em;
  text-transform: uppercase; color: var(--text-muted); margin-bottom: 16px;
}

/* Status pane */
.status-hero { display: flex; align-items: center; gap: 20px }
.status-hero .moon {
  width: 64px; height: 64px; border-radius: 50%; flex-shrink: 0;
  border: 1.5px solid rgba(200,180,150,0.15);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--serif); font-size: 24px; font-weight: 400; color: var(--text-dim);
  transition: all 0.6s ease;
}
.status-hero .moon.active {
  border-color: var(--moon); color: var(--moon);
  box-shadow: 0 0 40px var(--moon-glow), inset 0 0 20px rgba(226,166,84,0.04);
}
.status-hero .moon.done { border-color: rgba(139,158,110,0.4); color: var(--olive) }
.status-hero .info { flex: 1 }
.status-hero .info .title { font-family: var(--serif); font-size: 18px; font-style: italic; margin-bottom: 4px }
.status-hero .info .sub { font-size: 12px; color: var(--text-dim); line-height: 1.5 }
.status-hero .info .motif { font-size: 12px; color: var(--moon); margin-top: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap }

/* Progress thread */
.progress-thread { height: 1px; background: var(--border); margin-top: 16px; position: relative }
.progress-thread .fill { height: 100%; background: var(--moon); transition: width 0.8s ease; position: relative }
.progress-thread .fill::after { content: ''; position: absolute; right: 0; top: -2px; width: 5px; height: 5px; border-radius: 50%; background: var(--moon); opacity: 0.6 }

/* ── Trigger ── */
.trigger-wrap { display: flex; gap: 8px }
.trigger-wrap input {
  flex: 1; padding: 11px 16px; border-radius: 8px; font-size: 13px; font-family: var(--sans);
  border: 1px solid var(--border); background: rgba(255,255,255,0.02);
  color: var(--text); outline: none; transition: border-color 0.2s;
}
.trigger-wrap input::placeholder { color: var(--text-muted) }
.trigger-wrap input:focus { border-color: var(--moon); background: rgba(255,255,255,0.03) }
.trigger-wrap button {
  padding: 11px 20px; border-radius: 8px; font-family: var(--sans); font-size: 13px;
  font-weight: 500; cursor: pointer; border: none;
  background: rgba(226,166,84,0.12); color: var(--moon);
  transition: all 0.2s; white-space: nowrap;
}
.trigger-wrap button:hover { background: rgba(226,166,84,0.2) }

/* ── Model ── */
.model-tabs { display: flex; gap: 4px }
.model-tabs button {
  flex: 1; padding: 8px 0; border-radius: 6px; font-size: 12px; font-family: var(--sans);
  border: 1px solid var(--border); background: transparent; color: var(--text-dim);
  cursor: pointer; transition: all 0.2s; text-align: center;
}
.model-tabs button:hover { border-color: rgba(200,180,150,0.25); color: var(--text) }
.model-tabs button.active {
  background: rgba(226,166,84,0.08); border-color: rgba(226,166,84,0.25); color: var(--moon);
}

/* ── Dream list ── */
.dream-pool { flex: 1; overflow-y: auto; padding: 8px 12px; scrollbar-gutter: stable }
.filter-row { display: flex; gap: 4px; padding: 4px 12px; flex-wrap: wrap }
.filter-row .chip {
  padding: 4px 14px; border-radius: 20px; font-size: 11px; font-family: var(--sans);
  border: 1px solid var(--border); background: transparent; color: var(--text-dim);
  cursor: pointer; transition: all 0.2s;
}
.filter-row .chip:hover { border-color: rgba(200,180,150,0.25); color: var(--text) }
.filter-row .chip.on { background: rgba(226,166,84,0.08); border-color: rgba(226,166,84,0.25); color: var(--moon) }
.search-inline { width: 100%; padding: 8px 16px; margin: 8px 12px; border-radius: 8px; font-size: 12px; font-family: var(--sans);
  border: 1px solid var(--border); background: rgba(255,255,255,0.02); color: var(--text); outline: none; width: calc(100% - 24px) }
.search-inline:focus { border-color: var(--moon) }

.entry {
  padding: 14px 16px; border-radius: 10px; cursor: pointer; transition: all 0.2s;
  display: flex; gap: 14px; align-items: flex-start; margin: 2px 0;
  border: 1px solid transparent;
}
.entry:hover { background: rgba(255,255,255,0.02); border-color: var(--border) }
.entry.picked { background: rgba(226,166,84,0.04); border-color: rgba(226,166,84,0.15) }
.entry .score-num {
  width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center;
  justify-content: center; font-family: var(--serif); font-size: 17px; font-weight: 600;
  flex-shrink: 0;
}
.entry .body { flex: 1; min-width: 0 }
.entry .motif-line { font-size: 13px; line-height: 1.4; overflow: hidden; text-overflow: ellipsis; white-space: nowrap }
.entry .sub-line { font-size: 11px; color: var(--text-dim); margin-top: 4px }

/* ── Main content areas ── */
.content { display: none; padding: 48px 56px; animation: reveal 0.4s ease }
.content.on { display: block }
@keyframes reveal { from { opacity: 0; transform: translateY(12px) } to { opacity: 1; transform: translateY(0) } }

/* Welcome */
.welcome { display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 80px 40px; min-height: 80vh }
.welcome .orb {
  width: 120px; height: 120px; border-radius: 50%; margin-bottom: 32px;
  background: radial-gradient(circle at 40% 35%, rgba(226,166,84,0.15), transparent 70%);
  border: 1px solid rgba(226,166,84,0.12);
  display: flex; align-items: center; justify-content: center; font-family: var(--serif);
  font-size: 48px; color: var(--moon); font-style: italic;
  animation: orbFloat 6s ease-in-out infinite;
}
@keyframes orbFloat {
  0%, 100% { transform: translateY(0) }
  50% { transform: translateY(-8px) }
}
.welcome h2 { font-family: var(--serif); font-size: 32px; font-weight: 400; font-style: italic; margin-bottom: 12px; letter-spacing: 0.01em }
.welcome .desc { font-size: 15px; color: var(--text-dim); max-width: 420px; line-height: 1.7 }
.welcome .hint-row { display: flex; gap: 32px; margin-top: 40px }
.welcome .hint { text-align: center }
.welcome .hint .k { font-family: var(--serif); font-size: 36px; font-style: italic; color: var(--moon); opacity: 0.6 }
.welcome .hint .v { font-size: 11px; color: var(--text-dim); margin-top: 6px; letter-spacing: 0.06em; text-transform: uppercase }

/* Detail */
.detail-header { margin-bottom: 32px }
.detail-header .breadcrumb { font-size: 12px; color: var(--text-dim); margin-bottom: 12px; cursor: pointer; transition: color 0.2s }
.detail-header .breadcrumb:hover { color: var(--moon) }
.detail-header h2 { font-family: var(--serif); font-size: 26px; font-weight: 400; line-height: 1.35; font-style: italic }

.meta-strip { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 32px }
.meta-strip span {
  padding: 5px 16px; border-radius: 20px; font-size: 11px; font-family: var(--sans);
  border: 1px solid var(--border); color: var(--text-dim); letter-spacing: 0.02em;
}

.score-plaque {
  display: flex; align-items: center; gap: 24px; padding: 28px 32px;
  background: var(--panel); border-radius: 14px; border: 1px solid var(--border);
  margin-bottom: 36px;
}
.score-plaque .ring {
  width: 88px; height: 88px; border-radius: 50%; display: flex; align-items: center;
  justify-content: center; font-family: var(--serif); font-size: 32px; font-weight: 600;
  border: 2.5px solid; flex-shrink: 0;
}
.score-plaque .stats { font-size: 13px; color: var(--text-dim); line-height: 2 }
.score-plaque .stats b { color: var(--text); font-weight: 500 }

/* Chart */
.chart-box { background: var(--panel); border-radius: 14px; padding: 28px; border: 1px solid var(--border); margin-bottom: 36px }
.chart-box canvas { width: 100%; height: 220px }

/* Solution */
.solution-box { background: var(--panel); border-radius: 14px; padding: 32px; border: 1px solid var(--border); margin-bottom: 36px }
.solution-box .body {
  font-family: var(--sans); font-size: 14px; line-height: 1.85; color: var(--text);
  max-height: 520px; overflow: auto; scrollbar-gutter: stable;
}
.solution-box .body h1, .solution-box .body h2, .solution-box .body h3 {
  font-family: var(--serif); font-weight: 600; font-style: italic;
  color: var(--moon); margin: 24px 0 12px; font-size: 18px;
}
.solution-box .body strong { font-weight: 600; color: #f0e8d8 }
.solution-box .body code { padding: 2px 8px; border-radius: 4px; background: rgba(226,166,84,0.06); font-family: var(--mono); font-size: 12px; color: var(--rose) }

/* Actions */
.action-strip { display: flex; gap: 12px; flex-wrap: wrap }
.action-strip button {
  padding: 10px 24px; border-radius: 8px; font-size: 13px; font-family: var(--sans); font-weight: 500;
  cursor: pointer; transition: all 0.2s; border: 1px solid var(--border);
  background: transparent; color: var(--text-dim);
}
.action-strip button:hover { border-color: rgba(200,180,150,0.3); color: var(--text) }
.action-strip button.primary { background: rgba(139,158,110,0.12); color: var(--olive); border-color: rgba(139,158,110,0.25) }
.action-strip button.primary:hover { background: rgba(139,158,110,0.2) }
.action-strip button.caution { color: var(--ember); border-color: rgba(196,96,64,0.2) }

/* Settings */
.settings-grid { display: grid; gap: 24px; max-width: 680px }
.setting-block { background: var(--panel); border-radius: 14px; border: 1px solid var(--border); overflow: hidden }
.setting-block .block-title { padding: 20px 24px 12px; font-family: var(--serif); font-size: 15px; font-style: italic; color: var(--text-dim) }
.setting-block .row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 24px; border-top: 1px solid var(--border);
}
.setting-block .row:first-of-type { border-top: none }
.setting-block .row label { font-size: 13px; font-weight: 400 }
.setting-block .row .note { font-size: 11px; color: var(--text-dim); margin-top: 2px }
.setting-block .row input[type=text], .setting-block .row input[type=number] {
  width: 130px; padding: 7px 12px; border-radius: 6px; font-size: 12px; font-family: var(--sans);
  border: 1px solid var(--border); background: rgba(255,255,255,0.02); color: var(--text);
  outline: none; text-align: right;
}
.setting-block .row input:focus { border-color: var(--moon) }
.setting-block .row input[type=checkbox] { accent-color: var(--moon); transform: scale(1.1) }
.settings-save {
  width: 100%; padding: 14px; border-radius: 10px; font-size: 14px; font-family: var(--sans);
  font-weight: 500; cursor: pointer; border: 1px solid rgba(226,166,84,0.3);
  background: rgba(226,166,84,0.08); color: var(--moon); transition: all 0.2s; margin-top: 8px;
}
.settings-save:hover { background: rgba(226,166,84,0.15) }

/* Modal */
.modal-back { position: fixed; inset: 0; background: rgba(4,6,10,0.8); backdrop-filter: blur(6px); z-index: 100;
  display: flex; align-items: center; justify-content: center; animation: reveal 0.2s }
.modal-card { background: var(--panel); border: 1px solid var(--border); border-radius: 16px; padding: 32px; width: 460px; max-width: 90vw; box-shadow: 0 20px 60px rgba(0,0,0,0.5) }
.modal-card h3 { font-family: var(--serif); font-size: 18px; font-style: italic; margin-bottom: 8px }
.modal-card p { font-size: 13px; color: var(--text-dim); line-height: 1.6; margin-bottom: 16px }
.modal-card textarea { width: 100%; height: 100px; padding: 14px; border-radius: 8px; font-size: 13px; font-family: var(--sans);
  border: 1px solid var(--border); background: rgba(255,255,255,0.02); color: var(--text); outline: none; resize: vertical }
.modal-card textarea:focus { border-color: var(--moon) }
.modal-card .btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px }
.modal-card .btns button { padding: 10px 22px; border-radius: 8px; font-size: 13px; font-family: var(--sans); cursor: pointer;
  border: 1px solid var(--border); background: transparent; color: var(--text-dim); transition: all 0.2s }
.modal-card .btns button.go { background: rgba(226,166,84,0.1); border-color: rgba(226,166,84,0.25); color: var(--moon) }
.modal-card .btns button.go:hover { background: rgba(226,166,84,0.18) }

/* Toast */
.note {
  position: fixed; bottom: 32px; right: 32px; z-index: 200;
  padding: 14px 28px; border-radius: 10px; font-size: 13px; font-family: var(--sans);
  background: var(--panel); border: 1px solid var(--border);
  color: var(--text); animation: noteIn 0.3s ease; box-shadow: 0 8px 24px rgba(0,0,0,0.4);
}
@keyframes noteIn { from { opacity: 0; transform: translateY(16px) } to { opacity: 1; transform: translateY(0) } }
</style>
</head>
<body>

<header class="masthead">
  <div class="logo"><div class="moon-phase" id="headerMoon"></div><em>The</em> DreamWeaver</div>
  <div class="nav-group">
    <span id="headerChip" class="status-chip idle"><span class="pulse-dot"></span>等待中</span>
    <span class="sep"></span>
    <button onclick="navigate('home')">阅览室</button>
    <button onclick="navigate('meta')">元学习</button>
    <button onclick="navigate('settings')">配置</button>
    <button class="primary" onclick="focusTrigger()">新梦境</button>
    <button class="stop" id="btnStop" style="display:none" onclick="stopDream()">中断</button>
  </div>
</header>

<div class="page">
  <aside class="col-side">
    <div class="pane">
      <div class="pane-label">今夜观测</div>
      <div class="status-hero">
        <div class="moon" id="sideMoon">—</div>
        <div class="info">
          <div class="title" id="sideTitle">静静等待</div>
          <div class="sub" id="sideSub">尚无梦境活动</div>
          <div class="motif" id="sideMotif"></div>
          <div class="progress-thread" id="sideProgress" style="display:none"><div class="fill" id="sideFill" style="width:0%"></div></div>
        </div>
      </div>
    </div>

    <div class="pane">
      <div class="pane-label">观测请求</div>
      <div class="trigger-wrap">
        <input id="motifInput" placeholder="你想探索什么？Enter 开始…" onkeydown="if(event.key==='Enter')startDream()">
      </div>
    </div>

    <div class="pane" style="padding-bottom:12px">
      <div class="pane-label">观测镜</div>
      <div class="model-tabs">
        <button id="tabCloud" class="active" onclick="setModel('cloud')">☁ DeepSeek</button>
        <button id="tabLocal" onclick="setModel('local')">🖥 Ollama</button>
      </div>
    </div>

    <div class="pane" style="flex:1;overflow:hidden;display:flex;flex-direction:column;padding-bottom:8px">
      <div class="pane-label" style="display:flex;justify-content:space-between">观测记录 <span id="dreamCount">0</span></div>
      <div class="filter-row">
        <span class="chip on" onclick="setFilter('all',this)">全部</span>
        <span class="chip" onclick="setFilter('completed',this)">已完成</span>
        <span class="chip" onclick="setFilter('running',this)">进行中</span>
        <span class="chip" onclick="setFilter('applied',this)">已采纳</span>
      </div>
      <input class="search-inline" id="searchInput" placeholder="检索记录…" oninput="loadHistory()">
      <div class="dream-pool" id="dreamPool"></div>
    </div>
  </aside>

  <main class="col-main">
    <div class="content on" id="viewHome"></div>
    <div class="content" id="viewDetail"></div>
    <div class="content" id="viewMeta"></div>
    <div class="content" id="viewSettings"></div>
  </main>
</div>

<script>
const API='http://127.0.0.1:8000/dream';
let selId=null,filter='all',_timer=null;

const $=s=>document.querySelector(s),$$=s=>document.querySelectorAll(s);
const toast=m=>{const t=document.createElement('div');t.className='note';t.textContent=m;document.body.appendChild(t);setTimeout(()=>t.remove(),3000)};
async function api(u,o){const r=await fetch(API+u,o);if(!r.ok)throw Error(r.status);return r.json()}

// ── Navigation ──
const _views={'home':'#viewHome','detail':'#viewDetail','meta':'#viewMeta','settings':'#viewSettings'};
function navigate(v){
  Object.entries(_views).forEach(([k,id])=>$(id).classList.toggle('on',k===v));
  if(v==='home')renderHome();
  if(v==='meta')renderMeta();
  if(v==='settings')renderSettings();
}
function focusTrigger(){$('#motifInput').focus();$('#motifInput').scrollIntoView({behavior:'smooth'})}

// ── Status polling ──
async function pollStatus(){
  try{
    const s=await api('/status');
    const running=s.status==='running';
    document.body.dataset.phase=s.status;
    $('#btnStop').style.display=running?'':'none';

    // Header moon
    const hm=$('#headerMoon');hm.classList.toggle('waxing',running);
    // Side moon
    const sm=$('#sideMoon'),st=$('#sideTitle'),ss=$('#sideSub'),smo=$('#sideMotif'),sp=$('#sideProgress'),sf=$('#sideFill');
    sm.className='moon';sm.textContent=running?'◐':'◯';

    else if(s.status==='completed'){sm.classList.add('done');st.textContent='观测完成';ss.textContent='梦境已结晶';sp.style.display='none'}

}

function md(t){return(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/^### (.+)$/gm,'<h3>$1</h3>').replace(/^## (.+)$/gm,'<h2>$1</h2>').replace(/^# (.+)$/gm,'<h1>$1</h1>').replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/`([^`]+)`/g,'<code>$1</code>')}
let _allIterations=[]; // Store for detail panel access
function drawChart(data){
  _allIterations=data;
  const c=document.getElementById('scC');if(!c)return;const ctx=c.getContext('2d'),W=c.parentElement.clientWidth-48,H=260;
  c.width=W*2;c.height=H*2;c.style.width=W+'px';c.style.height=H+'px';ctx.scale(2,2);
  c.style.cursor='pointer';c.title='点击节点查看该轮详情';
  c.onclick=function(e){const rect=c.getBoundingClientRect();const mx=(e.clientX-rect.left)*(W/rect.width),my=(e.clientY-rect.top)*(H/rect.height);
    const pad={t:24,r:24,b:36,l:48},pw=W-pad.l-pad.r,ph=H-pad.t-pad.b;
    const xs=data.map(d=>d.round||0),ys=data.map(d=>d.score||0),xM=Math.min(...xs),xX=Math.max(...xs)||1;
    const sx=v=>pad.l+(v-xM)/(xX-xM)*pw,sy=v=>pad.t+(1-v/10)*ph;
    for(let i=0;i<data.length;i++){const px=sx(data[i].round),py=sy(data[i].score);
      if(Math.hypot(mx-px,my-py)<12){showRoundDetail(i);return}}
  };
  const pad={t:24,r:24,b:50,l:48},pw=W-pad.l-pad.r,ph=H-pad.t-pad.b;
  const xs=data.map(d=>d.round||0),ys=data.map(d=>d.score||0),xM=Math.min(...xs),xX=Math.max(...xs)||1;
  const sx=v=>pad.l+(v-xM)/(xX-xM)*pw,sy=v=>pad.t+(1-v/10)*ph;
  // Grid
  ctx.strokeStyle='rgba(200,180,150,0.06)';ctx.lineWidth=1;
  for(let y=0;y<=10;y+=2){const py=sy(y);ctx.beginPath();ctx.moveTo(pad.l,py);ctx.lineTo(W-pad.r,py);ctx.stroke();ctx.fillStyle='rgba(138,128,120,0.5)';ctx.font='10px DM Sans';ctx.textAlign='right';ctx.fillText(y,pad.l-6,py+4)}
  // Spike highlight (score jump > 1.5)
  let prevScore=null;
  data.forEach((d,i)=>{
    if(prevScore!==null&&d.score-prevScore>1.5){const px=sx(d.round),py=sy(d.score);
      ctx.fillStyle='rgba(226,166,84,0.06)';ctx.beginPath();ctx.arc(px,py,16,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='rgba(251,191,36,0.4)';ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(px,py,16,0,Math.PI*2);ctx.stroke()}
    prevScore=d.score;
  });
  // Line
  ctx.strokeStyle='#e2a654';ctx.lineWidth=2;ctx.beginPath();ctx.shadowColor='rgba(226,166,84,0.3)';ctx.shadowBlur=10;
  data.forEach((d,i)=>{const px=sx(d.round),py=sy(d.score);i===0?ctx.moveTo(px,py):ctx.lineTo(px,py)});ctx.stroke();ctx.shadowBlur=0;
  // Nodes
  data.forEach((d,i)=>{
    const px=sx(d.round),py=sy(d.score),isMut=_allIterations.some(l=>l.round===d.round&&l.role==='mutator');
    const r=isMut?7:5;
    ctx.beginPath();ctx.arc(px,py,r,0,Math.PI*2);
    ctx.fillStyle=isMut?'#c084fc':d.score>=8?'#8b9e6e':d.score>=6?'#e2a654':'#c46040';
    ctx.fill();ctx.strokeStyle='#0f1520';ctx.lineWidth=1.5;ctx.stroke();
    // Mutation glow
    if(isMut){ctx.strokeStyle='rgba(192,132,252,0.35)';ctx.lineWidth=2;ctx.beginPath();ctx.arc(px,py,r+5,0,Math.PI*2);ctx.stroke()}
  });
  // X labels
  ctx.fillStyle='rgba(138,128,120,0.4)';ctx.textAlign='center';
  for(let i=0;i<data.length;i+=Math.max(1,Math.floor(data.length/10)))ctx.fillText(data[i].round,sx(data[i].round),H-8);
  ctx.fillStyle='rgba(138,128,120,0.3)';ctx.font='9px DM Sans';ctx.fillText('🟣 紫色=变异跃迁 · 点击节点查看详情',W/2,H+16);
}
function showRoundDetail(idx){
  const data=_allIterations;if(!data.length)return;
  const d=data[idx];const roundLogs=_allIterations.filter(l=>l.round===d.round);
  const panel=document.createElement('div');panel.style='position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:200;background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:28px;width:560px;max-width:90vw;max-height:80vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.6)';
  panel.innerHTML=`<div style="display:flex;justify-content:space-between;margin-bottom:16px"><h3 style="font-family:var(--serif);font-style:italic">第 ${d.round} 轮 · 评分 ${d.score?.toFixed(1)||'—'}</h3><button onclick="this.closest('[style]').remove()" style="background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:6px;padding:4px 12px;cursor:pointer;font-size:13px">✕</button></div>
  ${roundLogs.map(l=>`<div style="margin-bottom:16px;border-left:2px solid ${l.role==='mutator'?'#c084fc':l.role==='judge'?'#e2a654':'rgba(200,180,150,0.2)'};padding-left:14px"><div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:4px">${l.role}</div><div style="font-size:13px;line-height:1.6;color:var(--text);white-space:pre-wrap;max-height:200px;overflow:auto">${(l.response||l.content||'').slice(0,800)}</div></div>`).join('')}`;
  document.body.appendChild(panel);panel.addEventListener('click',e=>e.stopPropagation());
  setTimeout(()=>document.addEventListener('click',function f(e){if(!panel.contains(e.target)){panel.remove();document.removeEventListener('click',f)}},{once:false}),100);
}

    ${g.rows.map(f=>{
      if(f.t==='check') return `<div class="row"><div><label>${f.l}</label>${f.n?`<div class="note">${f.n}</div>`:''}</div><input type="checkbox" id="s_${f.k}"></div>`;
      if(f.t==='sel') return `<div class="row"><div><label>${f.l}</label>${f.n?`<div class="note">${f.n}</div>`:''}</div><select id="s_${f.k}" style="width:180px;padding:7px 12px;border-radius:6px;font-size:12px;font-family:var(--sans);border:1px solid var(--border);background:rgba(255,255,255,0.02);color:var(--text);outline:none">${f.o.map(v=>`<option value="${v}">${v}</option>`).join('')}</select></div>`;
      if(f.t==='txt') return `<div class="row"><div><label>${f.l}</label>${f.n?`<div class="note">${f.n}</div>`:''}</div><input type="text" id="s_${f.k}" value="${f.dv||''}"></div>`;
      return `<div class="row"><div><label>${f.l}</label>${f.n?`<div class="note">${f.n}</div>`:''}</div><input type="number" id="s_${f.k}" value="${f.dv||0}"></div>`
    }).join('')}</div>`).join('')}
    <button class="settings-save" onclick="saveSettings()">保存全部配置</button></div>`;
  loadSettings();
}
async function loadSettings(){
  try{const c=await api('/config');
    for(const[k,v]of Object.entries(c)){const e=document.getElementById('s_'+k);if(e){e.tagName==='SELECT'?e.value=v:e.type==='checkbox'?e.checked=!!v:e.value=v}}
    c.cloud_enabled?($('#tabLocal').classList.remove('active'),$('#tabCloud').classList.add('active')):($('#tabCloud').classList.remove('active'),$('#tabLocal').classList.add('active'))
  }catch(e){console.error(e)}
}
async function saveSettings(){
  const keys=['cloud_enabled','cloud_model','judge_model','local_model','daily_token_limit','enabled','idle_timeout_seconds','max_iterations','convergence_rounds','mutation_interval','max_dream_duration_minutes','checkpoint_interval','obsidian_vault_path','dream_folder','notification','resource_cpu_threshold','resource_memory_threshold'];
  const body={};keys.forEach(k=>{const e=document.getElementById('s_'+k);if(e)body[k]=e.tagName==='SELECT'?e.value:e.type==='checkbox'?e.checked:isNaN(Number(e.value))?e.value:Number(e.value)});
  try{await api('/config',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    body.cloud_enabled?($('#tabLocal').classList.remove('active'),$('#tabCloud').classList.add('active')):($('#tabCloud').classList.remove('active'),$('#tabLocal').classList.add('active'));
    toast('配置已保存')}catch(e){toast('保存失败')}
}

// ── Meta-Learning Panel ──

      </div>

        <div style="font-family:var(--serif);font-size:32px;color:${stats.model_ready?'var(--green)':'var(--text-muted)'}">${stats.model_ready?'✓':'…'}</div>
        <div style="font-size:11px;color:var(--text-dim);margin-top:4px">模型就绪 ${stats.confidence>0?'('+(stats.confidence*100).toFixed(0)+'%)':'(需20+样本)'}</div>
      </div>
      <div class="stat" style="background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:20px;text-align:center">
        <div style="font-family:var(--serif);font-size:32px;color:${self.budget_pct>80?'var(--red)':'var(--text-dim)'}">${self.today_tokens||0}</div>

    <div class="chart-box" style="margin-bottom:24px">

        <span style="width:80px;font-size:13px;color:var(--text)">${k}</span>
        <div style="flex:1;height:6px;border-radius:3px;background:rgba(255,255,255,0.04);overflow:hidden">
          <div style="width:${(v.avg_score/10*100).toFixed(0)}%;height:100%;border-radius:3px;background:${v.avg_score>=8?'var(--green)':v.avg_score>=6?'var(--moon)':'var(--red)'}"></div>

// ── Replay ──
async function replayDream(id){
  let iter=_allIterations;if(!iter.length){try{const d=await api('/'+id);iter=(d.iterations||[]).sort((a,b)=>(a.round||0)-(b.round||0))}catch(e){toast('加载失败');return}}
  const overlay=document.createElement('div');overlay.className='modal-back';
  overlay.innerHTML=`<div class="modal-card" style="width:640px;max-height:85vh;overflow-y:auto"><h3>▶ 梦境回放</h3><p id="rpRound" style="font-family:var(--serif);font-size:20px;font-style:italic;margin:12px 0">准备中…</p><div id="rpContent" style="font-size:13px;line-height:1.7;white-space:pre-wrap;max-height:50vh;overflow:auto;color:var(--text)"></div>
    <div class="btns"><button onclick="this.closest('.modal-back').remove()">关闭</button><button class="go" id="rpBtn" onclick="replayStep()">开始回放 ▶</button></div></div>`;
  document.body.appendChild(overlay);overlay.addEventListener('click',e=>e.target===overlay&&overlay.remove());
  window._rpIdx=0;window._rpData=iter;window._rpTimer=null;
}
function replayStep(){
  const d=window._rpData||[];if(!d.length)return;
  const idx=window._rpIdx||0;if(idx>=d.length){document.getElementById('rpBtn').textContent='回放完成';clearInterval(window._rpTimer);return}
  const l=d[idx];document.getElementById('rpRound').textContent=`第 ${l.round} 轮 · ${l.role}`;
  document.getElementById('rpContent').textContent=(l.response||l.content||'').slice(0,1500);
  document.getElementById('rpBtn').textContent=`继续 ▶ (${idx+1}/${d.length})`;
  window._rpIdx=idx+1;
}
function replayAuto(){window._rpIdx=0;replayStep();window._rpTimer=setInterval(replayStep,2500);document.getElementById('rpBtn').textContent='⏸ 暂停';document.getElementById('rpBtn').onclick=()=>{clearInterval(window._rpTimer);document.getElementById('rpBtn').textContent='继续 ▶';document.getElementById('rpBtn').onclick=()=>{window._rpTimer=setInterval(replayStep,2500)}}}

// ── Init ──
renderHome();pollStatus();loadHistory();_timer=setInterval(pollStatus,4000);
